name: Metrics

on:
  # Run automatically once a day
  schedule:
    - cron: "0 8 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Personal Access Token stored as a repo secret (see setup notes)
          token: ${{ secrets.METRICS_TOKEN }}

          # Output committed into the repo
          filename: github-metrics.svg
          user: karina-borges
          template: classic
          config_timezone: America/Sao_Paulo

          # Sections shown on the card (aggregate only — no private repo names)
          base: header, activity, community, metadata

          # Language breakdown, including private-repo bytes so Python shows up
          repositories_affiliations: owner, collaborator, organization_member
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_ignored: html, css, scss, dockerfile

          # Contribution calendar (gives the streak-style visual)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
