name: Metrics

on:
  # Run automatically once a day
  schedule:
    - cron: "0 8 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Personal Access Token stored as a repo secret
          token: ${{ secrets.METRICS_TOKEN }}

          # Output committed into the repo
          filename: github-metrics.svg
          user: karina-borges
          template: classic
          config_timezone: America/Sao_Paulo

          # Core sections (aggregate only — no private repo names exposed)
          base: header, activity, community, metadata

          # Language breakdown — in-depth mode analyzes repos (incl. private)
          # with GitHub linguist, so Python shows up accurately.
          repositories_affiliations: owner, collaborator, organization_member
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, scss, dockerfile

          # Contribution calendar (streak-style visual)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Coding habits — active hours/days, work patterns, indent style
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Notable contributions — organizations where you've committed meaningfully
          plugin_notable: yes
          plugin_notable_types: commit
