name: Metrics

on:
  # Run automatically once a day
  schedule:
    - cron: "0 8 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # --- Self-owned languages card (replaces the broken plugin section) ---
      - uses: actions/checkout@v4

      - name: Generate languages card
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: python3 scripts/generate_languages.py

      - name: Commit languages card (only when the distribution changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add languages.svg
          git diff --cached --quiet || { git commit -m "chore: update languages card"; git push; }

      # --- Metrics card (all sections here populate reliably) ---
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: karina-borges
          template: classic
          config_timezone: America/Sao_Paulo

          # Core sections (aggregate only — no private repo names exposed)
          base: header, activity, community, metadata

          # Contribution calendar + streaks (the standout visual)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
