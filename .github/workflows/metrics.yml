name: Metrics

on:
  # Run automatically once a day
  schedule:
    - cron: "0 8 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Personal Access Token stored as a repo secret
          token: ${{ secrets.METRICS_TOKEN }}

          # Output committed into the repo
          filename: github-metrics.svg
          user: karina-borges
          template: classic
          config_timezone: America/Sao_Paulo

          # Core sections (aggregate only — no private repo names exposed)
          base: header, activity, community, metadata

          # Language breakdown — "most-used" reads all-time bytes from GitHub's
          # GraphQL API and includes private repos via the token's repo scope.
          # (No indepth / bytes-size: those need push-event matching and broke it.)
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_ignored: html, css, scss, dockerfile

          # Contribution calendar (streak-style visual)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
